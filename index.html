<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Studio | Creative Archive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display:ital,wght@1,700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #0f172a; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid #f1f5f9; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .grid-bg { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 40px 40px; }
    </style>
</head>
<body class="grid-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyB7gtOe7Z7FLnbuYikJ9c4lonxGQkjC8xA",
            authDomain: "my-studio-20bd5.firebaseapp.com",
            projectId: "my-studio-20bd5",
            storageBucket: "my-studio-20bd5.firebasestorage.app",
            messagingSenderId: "82396430384",
            appId: "1:82396430384:web:e32d0000feff7866ededf5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function App() {
            const [items, setItems] = useState([]);
            const [isAuth, setIsAuth] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [activeTab, setActiveTab] = useState('Semua');
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            
            const [formData, setFormData] = useState({ 
                title: '', category: 'Website', fileData: '', description: '', link: '', type: 'image' 
            });
            
            const timerRef = useRef(null);

            useEffect(() => {
                auth.signInAnonymously().catch(e => console.error(e));
                const unsubscribe = db.collection('portfolio')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snapshot => {
                        setItems(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setLoading(false);
                    }, () => setLoading(false));
                return () => unsubscribe();
            }, []);

            const handleLongPress = () => {
                timerRef.current = setTimeout(() => setShowLogin(true), 3000);
            };

            const compressImage = (base64Str, maxWidth = 1200) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = maxWidth / img.width;
                        if (scale < 1) {
                            canvas.width = maxWidth;
                            canvas.height = img.height * scale;
                        } else {
                            canvas.width = img.width;
                            canvas.height = img.height;
                        }
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                });
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                // Mendukung hingga 25MB dengan kompresi client-side
                if (file.size > 26214400) return alert("File terlalu besar (Maks 25MB).");

                const reader = new FileReader();
                reader.onload = async (ev) => {
                    let finalData = ev.target.result;
                    const isImage = file.type.startsWith('image/');
                    
                    if (isImage) {
                        finalData = await compressImage(finalData);
                    }
                    
                    setFormData({ 
                        ...formData, 
                        fileData: finalData, 
                        type: file.type.startsWith('video/') ? 'video' : 'image' 
                    });
                };
                reader.readAsDataURL(file);
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                try {
                    await db.collection('portfolio').add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        dateStr: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })
                    });
                    setShowModal(false);
                    setFormData({ title: '', category: 'Website', fileData: '', description: '', link: '', type: 'image' });
                } catch (err) {
                    alert("Gagal menyimpan. Pastikan koneksi stabil.");
                }
                setIsSaving(false);
            };

            const filtered = activeTab === 'Semua' ? items : items.filter(i => i.category === activeTab);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 glass-nav px-6 md:px-12 h-24 flex justify-between items-center">
                        <div 
                            onMouseDown={handleLongPress} onTouchStart={handleLongPress} 
                            onMouseUp={() => clearTimeout(timerRef.current)} onTouchEnd={() => clearTimeout(timerRef.current)} 
                            className="text-3xl font-black tracking-tighter cursor-pointer select-none"
                        >
                            MYSTUDIO<span className="text-indigo-600">.</span>
                        </div>
                        <div className="hidden md:flex gap-10 text-[11px] font-black uppercase tracking-widest text-slate-400">
                            <a href="#work" className="hover:text-indigo-600">Selected Work</a>
                            <a href="#about" className="hover:text-indigo-600">About</a>
                            <a href="#contact" className="hover:text-indigo-600">Contact</a>
                        </div>
                        {isAuth && <div className="bg-indigo-600 text-white px-4 py-2 rounded-full text-[10px] font-bold">ADMIN ACTIVE</div>}
                    </nav>

                    {/* Hero Section */}
                    <header className="pt-48 pb-24 px-6 md:px-12 max-w-7xl mx-auto border-b border-slate-100 bg-white">
                        <div className="grid md:grid-cols-2 gap-12 items-end">
                            <div>
                                <h1 className="text-8xl md:text-[10rem] font-black tracking-tighter leading-[0.8] mb-12">
                                    Creative <br /><span className="font-serif italic text-indigo-600 tracking-normal">Archive.</span>
                                </h1>
                                <p className="text-2xl text-slate-500 font-medium max-w-md leading-relaxed">Arsip visual dan digital oleh Agistiana. Berbasis di Kuningan, Jawa Barat.</p>
                            </div>
                            <div className="flex flex-col gap-6 items-start md:items-end">
                                <div className="text-right">
                                    <div className="text-5xl font-black italic">{items.length}</div>
                                    <div className="text-[10px] font-bold uppercase tracking-[0.3em] text-slate-300">Portofolio Terarsip</div>
                                </div>
                                <a href="#contact" className="px-10 py-5 bg-slate-900 text-white rounded-full font-black text-xs uppercase tracking-widest hover:bg-indigo-600 transition-all">Hubungi Saya</a>
                            </div>
                        </div>
                    </header>

                    {/* Filter Section */}
                    <div id="work" className="sticky top-24 z-40 bg-white/90 backdrop-blur-md border-b border-slate-100 py-8 px-6 overflow-x-auto no-scrollbar">
                        <div className="max-w-7xl mx-auto flex gap-4">
                            {['Semua', 'Website', 'Foto', 'Video', 'Desain'].map(cat => (
                                <button key={cat} onClick={() => setActiveTab(cat)} className={`px-10 py-4 rounded-full text-[10px] font-black uppercase tracking-[0.2em] transition-all ${activeTab === cat ? 'bg-slate-900 text-white shadow-2xl' : 'bg-slate-50 text-slate-400 border border-transparent hover:border-slate-200'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Content Grid */}
                    <main className="py-24 px-6 md:px-12 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-24 pb-48">
                        {loading ? (
                            <div className="col-span-full py-40 text-center font-black text-slate-200 uppercase tracking-[1em] text-[10px]">Sinkronisasi Cloud...</div>
                        ) : filtered.map((item) => (
                            <div key={item.id} className="animate-card group">
                                <div className="relative aspect-[16/10] bg-slate-100 rounded-[60px] overflow-hidden shadow-2xl shadow-indigo-100/50 border-[12px] border-white transition-all group-hover:shadow-indigo-200/60">
                                    {item.type === 'video' ? (
                                        <video src={item.fileData} autoPlay muted loop playsInline className="w-full h-full object-cover" />
                                    ) : (
                                        <img src={item.fileData} className="w-full h-full object-cover transition-all duration-700" />
                                    )}
                                </div>
                                <div className="mt-12 px-6">
                                    <div className="flex items-center gap-4 mb-6">
                                        <span className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.4em] bg-indigo-50 px-4 py-2 rounded-full">{item.category}</span>
                                        <span className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">{item.dateStr}</span>
                                    </div>
                                    <div className="flex justify-between items-end gap-10">
                                        <div className="flex-1">
                                            <h3 className="text-4xl md:text-5xl font-black tracking-tighter mb-6 group-hover:text-indigo-600 transition-colors leading-tight">{item.title}</h3>
                                            <p className="text-slate-400 font-medium text-lg leading-relaxed max-w-md italic">"{item.description}"</p>
                                        </div>
                                        {item.link && (
                                            <a href={item.link.startsWith('http') ? item.link : `https://${item.link}`} target="_blank" className="flex items-center gap-3 text-[10px] font-black uppercase tracking-[0.3em] group-hover:text-indigo-600 transition-all">
                                                Lihat Proyek 
                                                <div className="w-12 h-12 rounded-full border border-slate-200 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white group-hover:border-transparent transition-all">
                                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M7 17L17 7M17 7H7M17 7V17" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                                </div>
                                            </a>
                                        )}
                                    </div>
                                    {isAuth && (
                                        <button onClick={async () => {if(confirm("Hapus?")) await db.collection('portfolio').doc(item.id).delete()}} className="mt-8 text-[10px] font-black text-red-400 uppercase tracking-widest hover:text-red-600 transition-all underline decoration-2 underline-offset-8">Hapus dari Cloud</button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Footer Section */}
                    <footer id="contact" className="bg-slate-900 text-white py-32 px-6 md:px-12">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid md:grid-cols-2 gap-20 items-start mb-32">
                                <div>
                                    <h2 className="text-6xl md:text-8xl font-black tracking-tighter leading-none mb-10">Mari Mulai <br/><span className="italic font-serif text-slate-500 tracking-normal">Kolaborasi.</span></h2>
                                    <p className="text-slate-400 text-xl font-medium max-w-sm">Hubungi saya untuk mendiskusikan ide-ide kreatif Anda selanjutnya.</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12 border-l border-slate-800 pl-12">
                                    <div>
                                        <h4 className="text-[10px] font-black uppercase tracking-[0.5em] text-slate-600 mb-6">Kontak</h4>
                                        <p className="font-bold mb-2">agistiana555@gmail.com</p>
                                        <p className="font-bold">+62 831 6681 9166</p>
                                    </div>
                                    <div>
                                        <h4 className="text-[10px] font-black uppercase tracking-[0.5em] text-slate-600 mb-6">Sosial Media</h4>
                                        <a href="https://instagram.com/gisghost001" target="_blank" className="font-bold mb-2 block underline">Instagram @gisghost001</a>
                                        <p className="font-bold text-slate-500">Kuningan, Jawa Barat, ID</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex flex-col md:flex-row justify-between items-center pt-20 border-t border-slate-800 gap-8 text-center md:text-left">
                                <div className="text-2xl font-black">MYSTUDIO<span className="text-indigo-600">.</span></div>
                                <div className="text-[9px] font-black text-slate-600 uppercase tracking-[0.5em]">© 2024 Arisp Digital Agistiana Nurohman. Kuningan, Indonesia.</div>
                            </div>
                        </div>
                    </footer>

                    {/* Login Modal */}
                    {showLogin && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/95 backdrop-blur-3xl flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[60px] p-16 text-center shadow-2xl animate-card">
                                <h3 className="text-2xl font-black mb-10 tracking-tighter uppercase italic">Admin Access</h3>
                                <input type="password" placeholder="Passcode" className="w-full px-8 py-6 bg-slate-50 rounded-3xl font-black text-center mb-6 tracking-widest border-none outline-none focus:ring-4 focus:ring-indigo-50 text-xl" value={passInput} onChange={e => setPassInput(e.target.value)} autoFocus />
                                <button onClick={() => {if(passInput==='2024'){setIsAuth(true); setShowLogin(false); setPassInput('');} else alert('Unauthorized');}} className="w-full py-6 bg-indigo-600 text-white rounded-3xl font-black shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">LOGIN</button>
                                <button onClick={() => setShowLogin(false)} className="mt-6 text-slate-300 font-bold text-[10px] uppercase tracking-widest">Batal</button>
                            </div>
                        </div>
                    )}

                    {/* Upload Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-[100] bg-white overflow-y-auto px-6 md:px-20 py-20">
                            <div className="max-w-2xl mx-auto">
                                <div className="flex justify-between items-center mb-16">
                                    <h2 className="text-5xl font-black italic tracking-tighter uppercase leading-none">Tambah <br/>Karya</h2>
                                    <button onClick={() => setShowModal(false)} className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center font-bold text-xl hover:bg-slate-900 hover:text-white transition-all">✕</button>
                                </div>
                                <form onSubmit={handleSave} className="space-y-10 pb-40">
                                    <div className="relative aspect-video bg-slate-50 border-4 border-dashed border-slate-200 rounded-[50px] flex items-center justify-center overflow-hidden transition-all hover:border-indigo-200 group">
                                        {formData.fileData ? (
                                            formData.type === 'video' ? <video src={formData.fileData} className="w-full h-full object-cover" /> : <img src={formData.fileData} className="w-full h-full object-cover" />
                                        ) : (
                                            <div className="text-center group-hover:scale-110 transition-transform px-10">
                                                <div className="text-slate-300 font-black text-[10px] uppercase tracking-[0.4em] mb-4">Pilih Media (Foto/Video)</div>
                                                <div className="text-slate-200 text-[8px] font-bold uppercase tracking-widest italic">Mendukung hingga 25MB</div>
                                            </div>
                                        )}
                                        <input type="file" accept="image/*,video/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleFileUpload} required />
                                    </div>
                                    <div className="grid gap-6">
                                        <input placeholder="Judul Proyek" className="w-full px-10 py-7 bg-slate-50 rounded-[35px] font-black border-none outline-none focus:ring-4 focus:ring-indigo-50" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} required />
                                        <div className="grid grid-cols-2 gap-6">
                                            <select className="px-10 py-7 bg-slate-50 rounded-[35px] font-black border-none outline-none focus:ring-4 focus:ring-indigo-50 text-indigo-600 appearance-none" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                                <option>Website</option><option>Foto</option><option>Video</option><option>Desain</option>
                                            </select>
                                            <input placeholder="Link Proyek (Opsional)" className="px-10 py-7 bg-slate-50 rounded-[35px] font-black border-none outline-none focus:ring-4 focus:ring-indigo-50" value={formData.link} onChange={e => setFormData({...formData, link: e.target.value})} />
                                        </div>
                                        <textarea placeholder="Deskripsikan proses kreatif atau detail karya..." className="w-full px-10 py-8 bg-slate-50 rounded-[45px] font-black border-none outline-none focus:ring-4 focus:ring-indigo-50 h-48 resize-none" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} required />
                                    </div>
                                    <button disabled={isSaving} className={`w-full py-8 text-white rounded-full font-black shadow-2xl transition-all text-sm tracking-widest ${isSaving ? 'bg-slate-200' : 'bg-slate-900 active:scale-95 hover:bg-indigo-600'}`}>
                                        {isSaving ? 'SEDANG MENGUPLOAD...' : 'PUBLIKASIKAN KE ARSIP'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Floating Add Button */}
                    {isAuth && (
                        <button onClick={() => setShowModal(true)} className="fixed bottom-12 right-12 w-24 h-24 bg-indigo-600 text-white rounded-[40px] shadow-2xl flex items-center justify-center z-50 hover:scale-110 active:scale-95 transition-all shadow-indigo-300">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><path d="M12 5v14M5 12h14" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        </button>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
