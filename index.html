<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Kreatif | Digital Archive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK Compat Mode (Lebih stabil untuk single file) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display:ital,wght@1,700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid #f1f5f9; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KONFIGURASI FIREBASE ANDA ---
        const firebaseConfig = {
            apiKey: "AIzaSyB7gtOe7Z7FLnbuYikJ9c4lonxGQkjC8xA",
            authDomain: "my-studio-20bd5.firebaseapp.com",
            projectId: "my-studio-20bd5",
            storageBucket: "my-studio-20bd5.firebasestorage.app",
            messagingSenderId: "82396430384",
            appId: "1:82396430384:web:e32d0000feff7866ededf5"
        };

        // Inisialisasi Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        const Icons = {
            Plus: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" strokeLinecap="round" strokeLinejoin="round"/></svg>,
            X: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" strokeLinecap="round" strokeLinejoin="round"/></svg>,
            Trash: () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
            External: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" strokeLinecap="round" strokeLinejoin="round"/></svg>,
            Lock: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" strokeLinecap="round" strokeLinejoin="round"/></svg>
        };

        function App() {
            const [items, setItems] = useState([]);
            const [isAuth, setIsAuth] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [activeTab, setActiveTab] = useState('Semua');
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [formData, setFormData] = useState({ title: '', category: 'Website', fileData: '', description: '', link: '', type: 'image' });
            
            const timerRef = useRef(null);

            // Listen to Firestore
            useEffect(() => {
                // Sign in Anonim agar bisa baca/tulis di test mode
                auth.signInAnonymously().catch(e => console.error("Auth Fail:", e));

                const unsubscribe = db.collection('portfolio')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snapshot => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setItems(data);
                        setLoading(false);
                    }, err => {
                        console.error("Firestore Error:", err);
                        setLoading(false);
                    });

                return () => unsubscribe();
            }, []);

            const handleLongPress = () => {
                timerRef.current = setTimeout(() => setShowLogin(true), 3000);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const isVideo = file.type.startsWith('video/');
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setFormData({ ...formData, fileData: ev.target.result, type: isVideo ? 'video' : 'image' });
                };
                reader.readAsDataURL(file);
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (isSaving) return;
                setIsSaving(true);
                
                try {
                    await db.collection('portfolio').add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        dateStr: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })
                    });
                    setShowModal(false);
                    setFormData({ title: '', category: 'Website', fileData: '', description: '', link: '', type: 'image' });
                } catch (err) {
                    alert("Error saat simpan: " + err.message);
                }
                setIsSaving(false);
            };

            const handleDelete = async (id) => {
                if (window.confirm("Hapus karya ini dari arsip?")) {
                    await db.collection('portfolio').doc(id).delete();
                }
            };

            const filtered = activeTab === 'Semua' ? items : items.filter(i => i.category === activeTab);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <nav className="fixed top-0 w-full z-50 glass px-8 h-20 flex justify-between items-center">
                        <div 
                            onMouseDown={handleLongPress} onTouchStart={handleLongPress} 
                            onMouseUp={() => clearTimeout(timerRef.current)} onTouchEnd={() => clearTimeout(timerRef.current)} 
                            className="text-2xl font-black tracking-tighter cursor-pointer select-none"
                        >
                            STUDIO<span className="text-indigo-600">.</span>
                        </div>
                        <div className="flex items-center gap-4">
                            {isAuth && <span className="text-[10px] font-black uppercase tracking-widest text-indigo-600 animate-pulse">Admin Mode</span>}
                            <div className="w-10 h-10 rounded-2xl bg-slate-900 flex items-center justify-center text-white font-bold shadow-xl">S</div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header className="pt-44 pb-16 px-8 max-w-7xl mx-auto w-full">
                        <div className="max-w-4xl">
                            <h1 className="text-7xl md:text-[120px] font-black tracking-tighter leading-[0.85] mb-10">
                                Digital <br /> <span className="font-serif italic text-slate-300">Archive.</span>
                            </h1>
                            <p className="text-xl md:text-2xl text-slate-400 font-medium leading-relaxed max-w-2xl">Pusat dokumentasi karya kreatif, sistem, dan eksplorasi visual studio.</p>
                        </div>
                    </header>

                    {/* Filter Tab */}
                    <div className="sticky top-20 z-40 bg-white/90 backdrop-blur-md border-b border-slate-50 py-6 px-8 overflow-x-auto scrollbar-hide">
                        <div className="max-w-7xl mx-auto flex gap-3">
                            {['Semua', 'Website', 'Foto', 'Video', 'Desain'].map(cat => (
                                <button key={cat} onClick={() => setActiveTab(cat)} className={`px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] transition-all duration-300 ${activeTab === cat ? 'bg-indigo-600 text-white shadow-2xl scale-105' : 'bg-slate-50 text-slate-400 hover:bg-slate-100'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="flex-grow py-20 px-8 max-w-7xl mx-auto w-full">
                        {loading ? (
                            <div className="py-40 text-center font-black text-slate-200 uppercase tracking-[1em] animate-pulse">Syncing...</div>
                        ) : filtered.length === 0 ? (
                            <div className="py-40 text-center border-4 border-dashed border-slate-50 rounded-[60px] flex flex-col items-center justify-center">
                                <p className="text-slate-300 font-black uppercase tracking-[0.4em] text-xs">Belum ada karya yang diarsipkan</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-20">
                                {filtered.map(item => (
                                    <div key={item.id} className="animate-fade-up group">
                                        <div className="relative aspect-[4/3] bg-slate-50 rounded-[60px] overflow-hidden shadow-2xl shadow-slate-100 border border-slate-50">
                                            {item.type === 'video' ? (
                                                <video src={item.fileData} autoPlay muted loop playsInline className="w-full h-full object-cover" />
                                            ) : (
                                                <img src={item.fileData} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-[2s]" />
                                            )}
                                            {isAuth && (
                                                <button onClick={() => handleDelete(item.id)} className="absolute top-8 right-8 p-5 bg-white/90 backdrop-blur text-red-500 rounded-[30px] shadow-2xl hover:bg-red-500 hover:text-white transition-all"><Icons.Trash /></button>
                                            )}
                                        </div>
                                        <div className="mt-12 px-4 flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-4 mb-4">
                                                    <span className="text-[10px] font-black text-indigo-500 uppercase tracking-[0.3em]">{item.category}</span>
                                                    <span className="w-1.5 h-1.5 bg-slate-200 rounded-full"></span>
                                                    <span className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">{item.dateStr}</span>
                                                </div>
                                                <h3 className="text-4xl font-black tracking-tighter mb-6">{item.title}</h3>
                                                <p className="text-slate-400 text-lg font-medium leading-relaxed italic">"{item.description}"</p>
                                            </div>
                                            {item.link && (
                                                <a href={item.link.startsWith('http') ? item.link : `https://${item.link}`} target="_blank" className="w-20 h-20 rounded-[35px] bg-slate-900 text-white flex items-center justify-center shadow-2xl hover:bg-indigo-600 transition-all hover:-rotate-12"><Icons.External /></a>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-900 text-white pt-32 pb-16 px-8">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-12 border-b border-slate-800 pb-20 mb-12">
                                <div className="text-4xl font-black tracking-tighter">STUDIO<span className="text-indigo-600">.</span></div>
                                <div className="flex gap-12 text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">
                                    <span className="hover:text-indigo-400 cursor-pointer">Instagram</span>
                                    <span className="hover:text-indigo-400 cursor-pointer">Behance</span>
                                    <span className="hover:text-indigo-400 cursor-pointer">LinkedIn</span>
                                </div>
                            </div>
                            <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                                <p className="text-[10px] font-black text-slate-600 uppercase tracking-[0.5em]">© 2024 My Studio Digital Archives.</p>
                                <p className="text-[10px] font-black text-slate-600 uppercase tracking-[0.5em]">Jakarta, ID</p>
                            </div>
                        </div>
                    </footer>

                    {/* Modals */}
                    {showLogin && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/90 backdrop-blur-3xl flex items-center justify-center p-8">
                            <div className="bg-white w-full max-w-sm rounded-[60px] p-12 text-center shadow-2xl animate-fade-up">
                                <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-[30px] flex items-center justify-center mx-auto mb-10"><Icons.Lock /></div>
                                <h3 className="text-2xl font-black mb-10 tracking-tight italic uppercase">ADMIN AUTH</h3>
                                <form onSubmit={(e) => { e.preventDefault(); if(passInput==='2024'){setIsAuth(true); setShowLogin(false); setPassInput('');} else alert('Unauthorized'); }}>
                                    <input type="password" placeholder="Passcode" className="w-full px-8 py-5 bg-slate-50 rounded-2xl font-black text-center mb-8 tracking-widest outline-none border-none focus:ring-4 focus:ring-indigo-50" value={passInput} onChange={e => setPassInput(e.target.value)} autoFocus />
                                    <button className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-transform">VERIFY</button>
                                    <button type="button" onClick={() => setShowLogin(false)} className="w-full py-5 text-slate-300 font-bold mt-2">Dismiss</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showModal && (
                        <div className="fixed inset-0 z-[100] bg-white overflow-y-auto px-8 py-20">
                            <div className="max-w-2xl mx-auto">
                                <div className="flex justify-between items-center mb-16">
                                    <h2 className="text-6xl font-black italic tracking-tighter uppercase">Publish</h2>
                                    <button onClick={() => setShowModal(false)} className="p-6 bg-slate-100 rounded-full hover:rotate-90 transition-all active:scale-90"><Icons.X /></button>
                                </div>
                                <form onSubmit={handleSave} className="space-y-10 pb-40">
                                    <div className="group border-[4px] border-dashed border-slate-100 rounded-[60px] p-6 text-center cursor-pointer hover:border-indigo-100 bg-slate-50 aspect-[16/9] flex flex-col items-center justify-center overflow-hidden transition-all shadow-inner relative">
                                        {formData.fileData ? (
                                            formData.type === 'video' ? <video src={formData.fileData} className="absolute inset-0 w-full h-full object-cover" /> : <img src={formData.fileData} className="absolute inset-0 w-full h-full object-cover" />
                                        ) : (
                                            <div className="text-slate-300 font-black uppercase text-[10px] tracking-[0.4em]">Unggah Media (HD)</div>
                                        )}
                                        <input type="file" accept="image/*,video/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleFileUpload} required />
                                    </div>
                                    <div className="space-y-4">
                                        <input placeholder="Nama Proyek" className="w-full px-10 py-7 bg-slate-50 rounded-[35px] font-bold text-xl border-none outline-none focus:ring-4 focus:ring-indigo-50" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} required />
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <select className="px-10 py-7 bg-slate-50 rounded-[35px] font-bold border-none outline-none focus:ring-4 focus:ring-indigo-50 text-indigo-600 appearance-none" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                                <option value="Website">Website</option><option value="Foto">Foto</option><option value="Video">Video</option><option value="Desain">Desain</option>
                                            </select>
                                            <input placeholder="Link (e.g bit.ly/xx)" className="px-10 py-7 bg-slate-50 rounded-[35px] font-bold border-none outline-none focus:ring-4 focus:ring-indigo-50" value={formData.link} onChange={e => setFormData({...formData, link: e.target.value})} />
                                        </div>
                                        <textarea placeholder="Deskripsi atau makna karya ini..." className="w-full px-10 py-8 bg-slate-50 rounded-[40px] font-bold border-none outline-none focus:ring-4 focus:ring-indigo-50 h-52 resize-none leading-relaxed" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} required />
                                    </div>
                                    <button disabled={isSaving} className={`w-full py-8 text-white rounded-[40px] font-black shadow-2xl transition-all tracking-[0.2em] ${isSaving ? 'bg-slate-200' : 'bg-slate-900 hover:bg-indigo-600 hover:-translate-y-2'}`}>
                                        {isSaving ? 'PLEASE WAIT...' : 'PUBLISH TO CLOUD'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Floating Admin Button */}
                    {isAuth && (
                        <button onClick={() => setShowModal(true)} className="fixed bottom-12 right-10 w-24 h-24 bg-indigo-600 text-white rounded-[40px] shadow-2xl flex items-center justify-center z-50 hover:scale-110 hover:-rotate-12 transition-all active:scale-95">
                            <Icons.Plus />
                        </button>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
