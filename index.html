<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Kreatif | Portofolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Penerjemah JSX di Browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&family=Playfair+Display:ital@1&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F8F9FA] text-slate-900 selection:bg-indigo-600 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICON SVG ---
        // Menggunakan SVG bawaan agar tidak ada error saat deploy di Vercel
        const Icons = {
            Plus: ({size=24, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>,
            Trash2: ({size=24, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>,
            Edit3: ({size=24, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>,
            X: ({size=24, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>,
            ExternalLink: ({size=24, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>,
            Lock: ({size=24, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>,
            CheckCircle2: ({size=24, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
            AlertCircle: ({size=24, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
            Loader2: ({size=24, className=""}) => <svg width={size} height={size} className={`animate-spin ${className}`} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        };

        const { Plus, Trash2, Edit3, X, ExternalLink, Lock, CheckCircle2, AlertCircle, Loader2 } = Icons;

        function App() {
            const [user, setUser] = useState(null);
            const [fb, setFb] = useState(null);
            const [items, setItems] = useState([]);
            const [activeTab, setActiveTab] = useState('Semua');
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [passInput, setPassInput] = useState('');
            
            const [formData, setFormData] = useState({
                title: '', category: 'Website', imageUrl: '', description: '', link: '#'
            });

            const categories = ['Semua', 'Website', 'Foto', 'Video', 'Desain'];
            const timerRef = useRef(null);

            // 1. INISIALISASI FIREBASE (OTOMATIS)
            useEffect(() => {
                const loadFirebase = async () => {
                    try {
                        const appModule = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js');
                        const firestoreModule = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
                        const authModule = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');

                        // PENTING UNTUK VERCEL: 
                        // Jika Anda melihat error tidak bisa menyimpan di Vercel, 
                        // Ganti "KODE_API_ANDA" dkk di bawah ini dengan config dari Firebase Console Anda sendiri.
                        const configStr = typeof window.__firebase_config !== 'undefined' ? window.__firebase_config : null;
                        const manualConfig = {
                            apiKey: "KODE_API_ANDA",
                            authDomain: "DOMAIN_ANDA",
                            projectId: "PROJECT_ANDA",
                            storageBucket: "BUCKET_ANDA",
                            messagingSenderId: "SENDER_ID",
                            appId: "APP_ID"
                        };

                        const activeConfig = configStr ? JSON.parse(configStr) : manualConfig;
                        
                        const app = appModule.initializeApp(activeConfig);
                        const auth = authModule.getAuth(app);
                        const db = firestoreModule.getFirestore(app);

                        setFb({ auth, db, firestore: firestoreModule, authModule });

                        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            await authModule.signInWithCustomToken(auth, window.__initial_auth_token);
                        } else {
                            await authModule.signInAnonymously(auth);
                        }

                        authModule.onAuthStateChanged(auth, setUser);
                    } catch (err) {
                        console.error("Gagal memuat sistem database:", err);
                        setLoading(false);
                    }
                };
                loadFirebase();
            }, []);

            // 2. AMBIL DATA DARI FIREBASE
            useEffect(() => {
                if (!user || !fb) return;

                const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'portfolio-prod-001';
                const colRef = fb.firestore.collection(fb.db, 'artifacts', appId, 'public', 'data', 'portfolio');
                
                const unsubscribe = fb.firestore.onSnapshot(colRef, (snapshot) => {
                    const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    const sorted = docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    setItems(sorted);
                    setLoading(false);
                }, (err) => {
                    console.error("Error database:", err);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user, fb]);

            // 3. FITUR LONG PRESS (TEKAN LAMA)
            const startTimer = () => {
                timerRef.current = setTimeout(() => {
                    if (!isAuthorized) setShowAdminPanel(true);
                }, 3000); // 3 detik
            };
            const clearTimer = () => { if (timerRef.current) clearTimeout(timerRef.current); };

            // 4. LOGIKA TOMBOL & SIMPAN
            const handleAdminAuth = (e) => {
                e.preventDefault();
                if (passInput === '2024') {
                    setIsAuthorized(true);
                    setShowAdminPanel(false);
                    setPassInput('');
                } else { alert("Kode salah."); }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!isAuthorized || !user || !fb) return;
                
                setIsSaving(true);
                try {
                    const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'portfolio-prod-001';
                    const colPath = fb.firestore.collection(fb.db, 'artifacts', appId, 'public', 'data', 'portfolio');
                    
                    if (editingItem) {
                        const docRef = fb.firestore.doc(fb.db, 'artifacts', appId, 'public', 'data', 'portfolio', editingItem.id);
                        await fb.firestore.updateDoc(docRef, { ...formData, updatedAt: fb.firestore.serverTimestamp() });
                    } else {
                        await fb.firestore.addDoc(colPath, { ...formData, createdAt: fb.firestore.serverTimestamp() });
                    }
                    resetForm();
                } catch (err) {
                    alert("Gagal menyimpan: " + err.message);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleDelete = async (id) => {
                if (!isAuthorized || !confirm("Hapus karya ini?")) return;
                const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'portfolio-prod-001';
                await fb.firestore.deleteDoc(fb.firestore.doc(fb.db, 'artifacts', appId, 'public', 'data', 'portfolio', id));
            };

            const resetForm = () => {
                setFormData({ title: '', category: 'Website', imageUrl: '', description: '', link: '#' });
                setEditingItem(null);
                setShowModal(false);
            };

            const filteredItems = activeTab === 'Semua' ? items : items.filter(i => i.category === activeTab);

            // --- TAMPILAN PREMIUM ---
            return (
                <div className="min-h-screen">
                    {/* Navbar */}
                    <nav className="fixed top-0 w-full z-40 bg-white/80 backdrop-blur-xl border-b border-slate-100">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
                            <div 
                                onTouchStart={startTimer} onTouchEnd={clearTimer}
                                onMouseDown={startTimer} onMouseUp={clearTimer}
                                className="text-xl font-black tracking-tighter cursor-pointer select-none"
                            >
                                STUDIO<span className="text-indigo-600">.</span>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                {isAuthorized && (
                                    <div className="flex items-center gap-2 px-3 py-1.5 bg-green-50 rounded-full border border-green-100">
                                        <CheckCircle2 size={14} className="text-green-600" />
                                        <span className="text-[10px] font-bold text-green-600 uppercase tracking-widest">Admin Verified</span>
                                        <button onClick={() => setIsAuthorized(false)} className="ml-2 text-slate-400 hover:text-red-500">
                                            <X size={14} />
                                        </button>
                                    </div>
                                )}
                                <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center">
                                    <div className="w-2 h-2 bg-indigo-600 rounded-full"></div>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="pt-40 pb-16 px-6">
                        <div className="max-w-4xl mx-auto">
                            <div className="inline-block px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[10px] font-black uppercase tracking-widest mb-6">
                                Digital Portfolio 2024
                            </div>
                            <h1 className="text-5xl md:text-7xl font-bold tracking-tighter mb-6 leading-tight">
                                Desain visual <br/> yang <span className="italic font-serif text-slate-700">menginspirasi.</span>
                            </h1>
                            <p className="text-slate-500 text-lg max-w-xl font-medium leading-relaxed">
                                Menghadirkan solusi kreatif digital dengan pendekatan minimalis dan fungsional.
                            </p>
                        </div>
                    </header>

                    {/* Filter Kategori */}
                    <div className="sticky top-20 z-30 bg-white/90 backdrop-blur-md py-4 px-6 border-b border-slate-50 overflow-x-auto scrollbar-hide">
                        <div className="max-w-4xl mx-auto flex gap-2">
                            {categories.map(cat => (
                                <button
                                    key={cat}
                                    onClick={() => setActiveTab(cat)}
                                    className={`px-6 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all whitespace-nowrap ${activeTab === cat ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400 hover:bg-slate-100'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Galeri Konten */}
                    <main className="py-12 px-6 max-w-4xl mx-auto pb-40">
                        {loading ? (
                            <div className="flex flex-col items-center py-20 text-slate-300">
                                <Loader2 className="mb-4" size={32} />
                                <p className="font-bold text-[10px] uppercase tracking-widest">Sinkronisasi Data...</p>
                            </div>
                        ) : filteredItems.length === 0 ? (
                            <div className="py-32 text-center border-2 border-dashed border-slate-200 rounded-[40px]">
                                <AlertCircle className="mx-auto mb-4 text-slate-200" size={48} />
                                <p className="text-slate-400 font-bold text-xs uppercase tracking-widest">Galeri masih kosong</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 gap-16">
                                {filteredItems.map(item => (
                                    <div key={item.id} className="group">
                                        <div className="relative aspect-[16/10] rounded-[40px] overflow-hidden bg-slate-200 border border-white shadow-sm">
                                            <img 
                                                src={item.imageUrl} 
                                                alt={item.title} 
                                                className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000"
                                                onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop'; }}
                                            />
                                            {isAuthorized && (
                                                <div className="absolute top-6 right-6 flex gap-3">
                                                    <button onClick={() => { setEditingItem(item); setFormData(item); setShowModal(true); }} className="p-4 bg-white/90 backdrop-blur rounded-2xl text-blue-600 shadow-xl active:scale-90 transition-transform">
                                                        <Edit3 size={20}/>
                                                    </button>
                                                    <button onClick={() => handleDelete(item.id)} className="p-4 bg-white/90 backdrop-blur rounded-2xl text-red-500 shadow-xl active:scale-90 transition-transform">
                                                        <Trash2 size={20}/>
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                        <div className="mt-8 flex justify-between items-start">
                                            <div className="flex-1 pr-6">
                                                <span className="text-indigo-600 font-black text-[10px] uppercase tracking-[0.2em] mb-3 block">{item.category}</span>
                                                <h3 className="text-3xl font-bold tracking-tight mb-3">{item.title}</h3>
                                                <p className="text-slate-500 text-sm leading-relaxed">{item.description}</p>
                                            </div>
                                            <a href={item.link} target="_blank" className="w-14 h-14 bg-slate-900 text-white rounded-2xl flex items-center justify-center hover:bg-indigo-600 transition-colors shadow-lg active:scale-90">
                                                <ExternalLink size={24} />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modal Login Admin */}
                    {showAdminPanel && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/95 backdrop-blur-2xl flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl">
                                <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mb-8 mx-auto">
                                    <Lock size={28} />
                                </div>
                                <h2 className="text-2xl font-bold text-center mb-2 tracking-tight">Panel Admin</h2>
                                <p className="text-slate-400 text-center text-sm mb-10">Masukkan kode akses pribadi Anda.</p>
                                <form onSubmit={handleAdminAuth} className="space-y-4">
                                    <input 
                                        type="password" placeholder="Kode Rahasia" 
                                        className="w-full px-8 py-5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-600 outline-none font-bold text-center tracking-widest"
                                        value={passInput} onChange={e => setPassInput(e.target.value)} autoFocus
                                    />
                                    <div className="flex gap-3 pt-4">
                                        <button type="submit" className="flex-1 py-5 bg-indigo-600 text-white rounded-2xl font-bold active:scale-95 transition-transform shadow-xl shadow-indigo-100">Buka</button>
                                        <button type="button" onClick={() => setShowAdminPanel(false)} className="flex-1 py-5 bg-slate-100 text-slate-500 rounded-2xl font-bold active:scale-95 transition-transform">Tutup</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Tambah/Edit Karya */}
                    {showModal && (
                        <div className="fixed inset-0 z-[110] bg-white overflow-y-auto px-6 py-12">
                            <div className="max-w-lg mx-auto">
                                <div className="flex justify-between items-center mb-12">
                                   <h2 className="text-4xl font-bold tracking-tighter italic">{editingItem ? 'EDIT' : 'PUBLISH'}</h2>
                                   <button onClick={resetForm} className="w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center active:scale-90 transition-transform"><X size={28}/></button>
                                </div>
                                
                                <form onSubmit={handleSave} className="space-y-8">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Judul Karya</label>
                                        <input placeholder="Contoh: Brand Identity Design" className="w-full px-8 py-5 bg-slate-50 rounded-3xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-600 font-bold" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} required />
                                    </div>
                                    
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Kategori</label>
                                        <select className="w-full px-8 py-5 bg-slate-50 rounded-3xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-600 font-bold text-indigo-600" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                            {categories.filter(c => c !== 'Semua').map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">URL Link Gambar</label>
                                        <input placeholder="https://images.unsplash.com/..." className="w-full px-8 py-5 bg-slate-50 rounded-3xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-600 text-sm" value={formData.imageUrl} onChange={e => setFormData({...formData, imageUrl: e.target.value})} required />
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Deskripsi Singkat</label>
                                        <textarea placeholder="Jelaskan sedikit tentang proses kreatif Anda..." className="w-full px-8 py-5 bg-slate-50 rounded-3xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-600 h-40 resize-none text-sm leading-relaxed" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} required />
                                    </div>

                                    <button disabled={isSaving} className={`w-full py-6 text-white rounded-[32px] font-bold flex items-center justify-center gap-3 transition-all ${isSaving ? 'bg-slate-300' : 'bg-slate-900 shadow-2xl active:scale-[0.98]'}`}>
                                        {isSaving ? <Loader2 className="animate-spin" size={24} /> : 'SIMPAN PORTOFOLIO SEKARANG'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Tombol Tambah Mengambang */}
                    {isAuthorized && !showModal && (
                        <button onClick={() => setShowModal(true)} className="fixed bottom-10 right-8 w-16 h-16 bg-indigo-600 text-white rounded-3xl shadow-2xl flex items-center justify-center z-50 active:scale-90 transition-transform">
                            <Plus size={32} />
                        </button>
                    )}

                    <footer className="py-20 px-6 text-center border-t border-slate-100 bg-white">
                        <div className="font-black text-lg mb-4 tracking-tighter">STUDIO<span className="text-indigo-600">.</span></div>
                        <p className="text-[10px] font-bold text-slate-300 uppercase tracking-[0.5em]">Digital Collective © 2024</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
