<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Studio | Creative Director & Developer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,700&display=swap');
        
        :root {
            --accent: #4f46e5;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #ffffff; 
            color: #1a1a1a; 
            scroll-behavior: smooth; 
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        
        .glass-nav { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }

        .card-shadow {
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .card-shadow:hover {
            box-shadow: 0 30px 60px -12px rgba(79, 70, 229, 0.15);
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal { animation: reveal 1s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .grid-dots {
            background-image: radial-gradient(#d1d5db 0.8px, transparent 0.8px);
            background-size: 30px 30px;
        }

        .image-zoom:hover img {
            transform: scale(1.05);
        }

        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body class="grid-dots">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyB7gtOe7Z7FLnbuYikJ9c4lonxGQkjC8xA",
            authDomain: "my-studio-20bd5.firebaseapp.com",
            projectId: "my-studio-20bd5",
            storageBucket: "my-studio-20bd5.firebasestorage.app",
            messagingSenderId: "82396430384",
            appId: "1:82396430384:web:e32d0000feff7866ededf5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function App() {
            const [items, setItems] = useState([]);
            const [isAuth, setIsAuth] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [activeTab, setActiveTab] = useState('Semua');
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            
            const [formData, setFormData] = useState({ 
                title: '', category: 'Website', fileData: '', description: '', link: '', type: 'image' 
            });
            
            const timerRef = useRef(null);

            useEffect(() => {
                auth.signInAnonymously().catch(e => console.error(e));
                const unsubscribe = db.collection('portfolio')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snapshot => {
                        setItems(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setLoading(false);
                    }, () => setLoading(false));
                return () => unsubscribe();
            }, []);

            const handleLongPress = () => {
                timerRef.current = setTimeout(() => setShowLogin(true), 2500);
            };

            const compressImage = (base64Str, maxWidth = 1600) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width;
                        let h = img.height;
                        if (w > maxWidth) {
                            h = (maxWidth / w) * h;
                            w = maxWidth;
                        }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = "#FFFFFF";
                        ctx.fillRect(0, 0, w, h);
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                });
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 26214400) return alert("Maksimal file 25MB.");

                const reader = new FileReader();
                reader.onload = async (ev) => {
                    let dataUrl = ev.target.result;
                    if (file.type.startsWith('image/')) {
                        dataUrl = await compressImage(dataUrl);
                    }
                    setFormData({ 
                        ...formData, 
                        fileData: dataUrl, 
                        type: file.type.startsWith('video/') ? 'video' : 'image' 
                    });
                };
                reader.readAsDataURL(file);
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!formData.fileData) return alert("Pilih media!");
                setIsSaving(true);
                try {
                    await db.collection('portfolio').add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        dateStr: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })
                    });
                    setShowModal(false);
                    setFormData({ title: '', category: 'Website', fileData: '', description: '', link: '', type: 'image' });
                } catch (err) {
                    alert("Koneksi bermasalah.");
                }
                setIsSaving(false);
            };

            const filtered = activeTab === 'Semua' ? items : items.filter(i => i.category === activeTab);

            return (
                <div className="min-h-screen selection:bg-indigo-100 selection:text-indigo-900">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 glass-nav px-6 md:px-16 h-20 flex justify-between items-center transition-all duration-300">
                        <div 
                            onMouseDown={handleLongPress} onTouchStart={handleLongPress} 
                            onMouseUp={() => clearTimeout(timerRef.current)} onTouchEnd={() => clearTimeout(timerRef.current)} 
                            className="text-xl font-extrabold tracking-[-0.05em] cursor-pointer select-none group"
                        >
                            MYSTUDIO<span className="text-indigo-600 transition-all group-hover:ml-1">.</span>
                        </div>
                        <div className="hidden md:flex gap-12 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500">
                            <a href="#work" className="hover:text-indigo-600 transition-colors">Portofolio</a>
                            <a href="#about" className="hover:text-indigo-600 transition-colors">Tentang</a>
                            <a href="#contact" className="hover:text-indigo-600 transition-colors">Kontak</a>
                        </div>
                        <div className="flex items-center gap-4">
                            {isAuth && (
                                <div className="flex items-center gap-2 bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full text-[10px] font-bold border border-indigo-100">
                                    <div className="w-2 h-2 bg-indigo-600 rounded-full animate-pulse"></div>
                                    ADMIN
                                </div>
                            )}
                        </div>
                    </nav>

                    {/* Hero */}
                    <section className="pt-40 md:pt-52 pb-24 px-6 md:px-16 max-w-7xl mx-auto reveal">
                        <div className="max-w-4xl">
                            <h1 className="text-6xl md:text-[8rem] font-extrabold tracking-tighter leading-[0.85] mb-12">
                                Visionary <br />
                                <span className="font-serif italic text-indigo-600 tracking-normal font-normal">Archive.</span>
                            </h1>
                            <p className="text-xl md:text-2xl text-slate-500 font-medium leading-relaxed mb-12 max-w-2xl">
                                Sebuah ruang penyimpanan digital untuk karya desain, website, dan visual sinematik.
                            </p>
                            <div className="flex flex-wrap gap-12 items-center">
                                <div className="flex -space-x-4">
                                    {[1,2,3].map(i => (
                                        <div key={i} className="w-12 h-12 rounded-full border-4 border-white bg-slate-100 overflow-hidden shadow-sm">
                                            <div className="w-full h-full bg-gradient-to-tr from-slate-200 to-slate-100"></div>
                                        </div>
                                    ))}
                                </div>
                                <div className="h-10 w-[1px] bg-slate-200"></div>
                                <div>
                                    <div className="text-3xl font-bold tracking-tighter">{items.length}+</div>
                                    <div className="text-[9px] font-bold uppercase tracking-[0.2em] text-slate-400">Proyek Berhasil</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Sticky Filter */}
                    <div id="work" className="sticky top-20 z-40 bg-white/80 backdrop-blur-xl border-y border-slate-100 py-6 px-6">
                        <div className="max-w-7xl mx-auto flex gap-3 overflow-x-auto no-scrollbar">
                            {['Semua', 'Website', 'Foto', 'Video', 'Desain'].map(cat => (
                                <button 
                                    key={cat} 
                                    onClick={() => setActiveTab(cat)} 
                                    className={`whitespace-nowrap px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-[0.15em] transition-all duration-300 ${activeTab === cat ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-200' : 'bg-transparent text-slate-400 hover:text-slate-900'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Work Grid */}
                    <main className="py-24 px-6 md:px-16 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-16 md:gap-24">
                        {loading ? (
                            <div className="col-span-full py-40 text-center">
                                <div className="inline-block w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                <div className="mt-4 text-[10px] font-bold uppercase tracking-[0.3em] text-slate-300">Mengambil Data...</div>
                            </div>
                        ) : filtered.map((item, idx) => (
                            <div key={item.id} className="reveal group" style={{animationDelay: `${idx * 0.1}s`}}>
                                <div className="relative aspect-[16/11] bg-slate-50 rounded-[48px] overflow-hidden card-shadow transition-all duration-700 image-zoom border border-slate-100">
                                    <div className="absolute top-8 left-8 z-10">
                                        <span className="bg-white/90 backdrop-blur-md text-indigo-600 px-4 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-widest shadow-sm">{item.category}</span>
                                    </div>
                                    {item.type === 'video' ? (
                                        <video src={item.fileData} autoPlay muted loop playsInline className="w-full h-full object-cover" />
                                    ) : (
                                        <img src={item.fileData} className="w-full h-full object-cover transition-transform duration-1000" />
                                    )}
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                                </div>
                                
                                <div className="mt-10 px-4">
                                    <div className="flex justify-between items-start gap-8 mb-6">
                                        <h3 className="text-3xl md:text-4xl font-extrabold tracking-tighter group-hover:text-indigo-600 transition-colors leading-tight">{item.title}</h3>
                                        <span className="text-[10px] font-bold text-slate-300 pt-2">{item.dateStr}</span>
                                    </div>
                                    <p className="text-slate-400 font-medium text-lg leading-relaxed mb-8 italic">"{item.description}"</p>
                                    
                                    <div className="flex items-center justify-between pt-6 border-t border-slate-100">
                                        {item.link ? (
                                            <a href={item.link.startsWith('http') ? item.link : `https://${item.link}`} target="_blank" className="flex items-center gap-4 text-[10px] font-extrabold uppercase tracking-[0.2em] group/link">
                                                Eksplorasi Proyek 
                                                <div className="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center group-hover/link:bg-indigo-600 group-hover/link:text-white group-hover/link:border-transparent transition-all">
                                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M7 17L17 7M17 7H7M17 7V17" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                                </div>
                                            </a>
                                        ) : <div></div>}
                                        
                                        {isAuth && (
                                            <button onClick={async () => {if(confirm("Hapus proyek ini?")) await db.collection('portfolio').doc(item.id).delete()}} className="text-[9px] font-black text-red-300 hover:text-red-500 uppercase tracking-widest transition-colors">Hapus</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* About Section */}
                    <section id="about" className="py-32 bg-slate-50 px-6 md:px-16 border-y border-slate-100">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-20 items-center">
                            <div className="relative aspect-square rounded-[60px] bg-slate-200 overflow-hidden shadow-2xl border-[15px] border-white">
                                <div className="absolute inset-0 bg-indigo-600/10 mix-blend-multiply"></div>
                                <div className="w-full h-full bg-gradient-to-br from-indigo-50 to-slate-200 flex items-center justify-center">
                                    <img src="Agistiana_Nurohman_bgbiru.png" />
                                </div>
                            </div>
                            <div>
                                <h2 className="text-5xl font-extrabold tracking-tighter mb-8 italic font-serif">Tentang <br/><span className="text-indigo-600 not-italic font-sans">Saya.</span></h2>
                                <p className="text-xl text-slate-500 font-medium leading-relaxed mb-8">
                                    Saya Agistiana Nurohman adalah seorang desainer dan pengembang yang fokus pada estetika minimalis dan fungsionalitas digital. Ia membangun narasi melalui kode dan visual.
                                </p>
                                <div className="grid grid-cols-2 gap-8">
                                    <div>
                                        <div className="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-600 mb-2">Fokus Utama</div>
                                        <div className="font-bold">UI/UX & Visual Art</div>
                                    </div>
                                    <div>
                                        <div className="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-600 mb-2">Lokasi</div>
                                        <div className="font-bold">Kuningan, Jawa Barat</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Contact & Footer */}
                    <footer id="contact" className="bg-white pt-40 pb-16 px-6 md:px-16">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-40">
                                <h2 className="text-7xl md:text-[9rem] font-extrabold tracking-tighter leading-none mb-12">Siap untuk <br/><span className="text-indigo-600 italic font-serif tracking-normal">Proyek Baru?</span></h2>
                                <a href="https://wa.me/6283166819166" target="_blank" className="inline-flex items-center gap-6 px-16 py-7 bg-indigo-600 text-white rounded-full font-extrabold text-sm uppercase tracking-[0.3em] hover:bg-slate-900 transition-all shadow-2xl shadow-indigo-200 active:scale-95 group">
                                    Mulai Sekarang
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" className="group-hover:translate-x-2 transition-transform"><path d="M5 12h14M12 5l7 7-7 7" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                </a>
                            </div>

                            <div className="grid md:grid-cols-3 gap-20 pt-24 border-t border-slate-100">
                                <div className="col-span-1">
                                    <div className="text-3xl font-black mb-8 tracking-tighter">MYSTUDIO<span className="text-indigo-600">.</span></div>
                                    <p className="text-slate-400 font-medium leading-relaxed">Membangun ekosistem digital yang bersih dan bermakna.</p>
                                </div>
                                <div>
                                    <h4 className="text-[14px] font-black uppercase tracking-[0.4em] text-slate-300 mb-8">Informasi</h4>
                                    <p className="font-bold mb-4">agistiana555@gmail.com</p>
                                    <p className="font-bold">+62 831 6681 9166</p>
                                </div>
                                <div>
                                    <h4 className="text-[14px] font-black uppercase tracking-[0.4em] text-slate-300 mb-8">Sosial Media</h4>
                                    <a href="https://instagram.com/gisghost001" target="_blank" className="font-bold block hover:text-indigo-600 transition-colors">Instagram @gisghost001</a>
                                    <p className="text-slate-400 mt-4 text-xs">Based in Indonesia</p>
                                </div>
                            </div>

                            <div className="mt-40 text-center">
                                <p className="text-[10px] font-bold text-slate-300 uppercase tracking-[0.8em]">© 2024 DIGITAL ARCHIVE BY AGISTIANA NUROHMAN</p>
                            </div>
                        </div>
                    </footer>

                    {/* Login Modal */}
                    {showLogin && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-3xl flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[56px] p-16 text-center shadow-2xl reveal">
                                <h3 className="text-2xl font-black mb-10 tracking-tighter uppercase italic">Panel Admin</h3>
                                <input type="password" placeholder="Passcode" className="w-full px-10 py-6 bg-slate-50 rounded-3xl font-black text-center mb-6 tracking-[0.5em] border-none outline-none focus:ring-4 focus:ring-indigo-100 text-2xl" value={passInput} onChange={e => setPassInput(e.target.value)} autoFocus />
                                <button onClick={() => {if(passInput==='2024'){setIsAuth(true); setShowLogin(false); setPassInput('');} else alert('Ditolak');}} className="w-full py-6 bg-indigo-600 text-white rounded-3xl font-black shadow-xl hover:bg-slate-900 transition-all">MASUK</button>
                                <button onClick={() => setShowLogin(false)} className="mt-8 text-slate-300 font-bold text-[10px] uppercase tracking-widest hover:text-slate-600">Batal</button>
                            </div>
                        </div>
                    )}

                    {/* Upload Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-[100] bg-white overflow-y-auto px-6 md:px-24 py-24">
                            <div className="max-w-3xl mx-auto">
                                <div className="flex justify-between items-center mb-24">
                                    <h2 className="text-5xl md:text-6xl font-extrabold italic tracking-tighter uppercase leading-none font-serif">Tambah <br/>Karya Baru</h2>
                                    <button onClick={() => setShowModal(false)} className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center font-bold text-xl hover:bg-slate-900 hover:text-white transition-all">✕</button>
                                </div>
                                <form onSubmit={handleSave} className="space-y-12 pb-40">
                                    <div className="relative aspect-video bg-slate-50 border-4 border-dashed border-slate-100 rounded-[60px] flex items-center justify-center overflow-hidden group transition-all hover:border-indigo-200">
                                        {formData.fileData ? (
                                            formData.type === 'video' ? <video src={formData.fileData} className="w-full h-full object-cover" /> : <img src={formData.fileData} className="w-full h-full object-cover" />
                                        ) : (
                                            <div className="text-center group-hover:scale-105 transition-transform">
                                                <div className="text-indigo-600 font-black text-[11px] uppercase tracking-[0.4em] mb-4">Pilih Media Anda</div>
                                                <div className="text-slate-300 text-[9px] font-bold uppercase tracking-widest italic">Mendukung Foto & Video (Maks 25MB)</div>
                                            </div>
                                        )}
                                        <input type="file" accept="image/*,video/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleFileUpload} required />
                                    </div>
                                    <div className="grid gap-8">
                                        <input placeholder="Nama Proyek" className="w-full px-10 py-8 bg-slate-50 rounded-[35px] font-bold border-none outline-none focus:ring-4 focus:ring-indigo-100 placeholder:text-slate-300" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} required />
                                        <div className="grid grid-cols-2 gap-8">
                                            <select className="px-10 py-8 bg-slate-50 rounded-[35px] font-bold border-none outline-none focus:ring-4 focus:ring-indigo-100 text-indigo-600 appearance-none" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                                <option>Website</option><option>Foto</option><option>Video</option><option>Desain</option>
                                            </select>
                                            <input placeholder="Tautan (Opsional)" className="px-10 py-8 bg-slate-50 rounded-[35px] font-bold border-none outline-none focus:ring-4 focus:ring-indigo-100 placeholder:text-slate-300" value={formData.link} onChange={e => setFormData({...formData, link: e.target.value})} />
                                        </div>
                                        <textarea placeholder="Tuliskan cerita singkat dibalik karya ini..." className="w-full px-10 py-10 bg-slate-50 rounded-[50px] font-bold border-none outline-none focus:ring-4 focus:ring-indigo-100 h-52 resize-none placeholder:text-slate-300" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} required />
                                    </div>
                                    <button disabled={isSaving} className={`w-full py-10 text-white rounded-full font-extrabold shadow-2xl transition-all text-xs tracking-[0.4em] ${isSaving ? 'bg-slate-200' : 'bg-indigo-600 hover:bg-slate-900 active:scale-[0.98]'}`}>
                                        {isSaving ? 'MENGUNGGAH KE CLOUD...' : 'PUBLIKASIKAN SEKARANG'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Floating Add Action */}
                    {isAuth && (
                        <button onClick={() => setShowModal(true)} className="fixed bottom-12 right-12 w-20 h-20 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center z-50 hover:scale-110 active:scale-95 transition-all shadow-indigo-300">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><path d="M12 5v14M5 12h14" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        </button>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
