<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Kreatif | Digital Archive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display:ital,wght@1,700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #0f172a; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid #f1f5f9; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: fadeUp 0.6s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyB7gtOe7Z7FLnbuYikJ9c4lonxGQkjC8xA",
            authDomain: "my-studio-20bd5.firebaseapp.com",
            projectId: "my-studio-20bd5",
            storageBucket: "my-studio-20bd5.firebasestorage.app",
            messagingSenderId: "82396430384",
            appId: "1:82396430384:web:e32d0000feff7866ededf5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function App() {
            const [items, setItems] = useState([]);
            const [isAuth, setIsAuth] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [activeTab, setActiveTab] = useState('Semua');
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [formData, setFormData] = useState({ title: '', category: 'Website', fileData: '', description: '', link: '', type: 'image' });
            
            const timerRef = useRef(null);

            useEffect(() => {
                // Aktifkan sesi anonim
                auth.signInAnonymously().catch(e => console.log("Auth:", e));
                
                // Ambil data dari Firestore
                const unsubscribe = db.collection('portfolio')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snapshot => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setItems(data);
                        setLoading(false);
                    }, () => setLoading(false));

                return () => unsubscribe();
            }, []);

            const handleLongPress = () => {
                timerRef.current = setTimeout(() => setShowLogin(true), 3000);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const isVideo = file.type.startsWith('video/');
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setFormData({ ...formData, fileData: ev.target.result, type: isVideo ? 'video' : 'image' });
                };
                reader.readAsDataURL(file);
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                try {
                    await db.collection('portfolio').add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        dateStr: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })
                    });
                    setShowModal(false);
                    setFormData({ title: '', category: 'Website', fileData: '', description: '', link: '', type: 'image' });
                } catch (err) {
                    alert("Error: " + err.message);
                }
                setIsSaving(false);
            };

            const handleDelete = async (id) => {
                if(confirm("Hapus karya ini?")) await db.collection('portfolio').doc(id).delete();
            };

            const filtered = activeTab === 'Semua' ? items : items.filter(i => i.category === activeTab);

            return (
                <div className="min-h-screen bg-[#fafafa]">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 glass-nav px-6 h-20 flex justify-between items-center">
                        <div 
                            onMouseDown={handleLongPress} onTouchStart={handleLongPress} 
                            onMouseUp={() => clearTimeout(timerRef.current)} onTouchEnd={() => clearTimeout(timerRef.current)} 
                            className="text-2xl font-black tracking-tighter cursor-pointer select-none"
                        >
                            STUDIO<span className="text-indigo-600">.</span>
                        </div>
                        <div className="flex items-center gap-3">
                            {isAuth && <span className="text-[9px] font-black bg-indigo-600 text-white px-3 py-1.5 rounded-full uppercase tracking-widest">Admin</span>}
                            <div className="w-10 h-10 rounded-2xl bg-slate-900 flex items-center justify-center text-white font-bold shadow-lg">S</div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="pt-40 pb-16 px-6 max-w-6xl mx-auto">
                        <div className="max-w-3xl">
                            <h1 className="text-7xl md:text-9xl font-black tracking-tighter leading-[0.85] mb-8">
                                Digital <br /> <span className="font-serif italic text-slate-300">Archive.</span>
                            </h1>
                            <p className="text-xl text-slate-400 font-medium leading-relaxed">Dokumentasi karya terpilih, sistem, dan eksplorasi visual studio dalam format arsip digital.</p>
                        </div>
                    </header>

                    {/* Filter Tabs */}
                    <div className="sticky top-20 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100 py-6 px-6 overflow-x-auto no-scrollbar">
                        <div className="max-w-6xl mx-auto flex gap-3">
                            {['Semua', 'Website', 'Foto', 'Video', 'Desain'].map(cat => (
                                <button key={cat} onClick={() => setActiveTab(cat)} className={`px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] transition-all whitespace-nowrap ${activeTab === cat ? 'bg-indigo-600 text-white shadow-xl scale-105' : 'bg-white text-slate-400 border border-slate-100'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Portfolio Grid */}
                    <main className="py-16 px-6 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-16 pb-40">
                        {loading ? (
                            <div className="col-span-full py-40 text-center font-black text-slate-200 uppercase tracking-[1em] animate-pulse text-xs">Menghubungkan Database...</div>
                        ) : filtered.length === 0 ? (
                            <div className="col-span-full py-40 text-center border-4 border-dashed border-slate-100 rounded-[50px] flex flex-col items-center justify-center">
                                <p className="text-slate-300 font-black uppercase tracking-[0.4em] text-[10px]">Arsip Kosong</p>
                            </div>
                        ) : (
                            filtered.map(item => (
                                <div key={item.id} className="animate-card group">
                                    <div className="relative aspect-[4/3] bg-white rounded-[50px] overflow-hidden shadow-2xl shadow-slate-200/50 border border-white">
                                        {item.type === 'video' ? (
                                            <video src={item.fileData} autoPlay muted loop playsInline className="w-full h-full object-cover" />
                                        ) : (
                                            <img src={item.fileData} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                        )}
                                        {isAuth && (
                                            <button onClick={() => handleDelete(item.id)} className="absolute top-6 right-6 p-4 bg-white/90 backdrop-blur text-red-500 rounded-3xl shadow-xl font-bold text-xs uppercase">Hapus</button>
                                        )}
                                    </div>
                                    <div className="mt-10 px-4">
                                        <div className="flex items-center gap-3 mb-4">
                                            <span className="text-[10px] font-black text-indigo-500 uppercase tracking-[0.3em]">{item.category}</span>
                                            <span className="w-1 h-1 bg-slate-200 rounded-full"></span>
                                            <span className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">{item.dateStr}</span>
                                        </div>
                                        <div className="flex justify-between items-start gap-4">
                                            <div>
                                                <h3 className="text-3xl font-black tracking-tighter mb-4">{item.title}</h3>
                                                <p className="text-slate-400 font-medium leading-relaxed italic line-clamp-2">"{item.description}"</p>
                                            </div>
                                            {item.link && (
                                                <a href={item.link.startsWith('http') ? item.link : `https://${item.link}`} target="_blank" className="w-14 h-14 shrink-0 rounded-2xl bg-slate-900 text-white flex items-center justify-center shadow-xl hover:bg-indigo-600 transition-all hover:-translate-y-1">
                                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M7 17L17 7M17 7H7M17 7V17" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                                </a>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t border-slate-100 py-12 px-6">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="text-xl font-black">STUDIO<span className="text-indigo-600">.</span></div>
                            <p className="text-[9px] font-black text-slate-300 uppercase tracking-[0.5em]">© 2024 Arisp Digital Terpusat.</p>
                        </div>
                    </footer>

                    {/* Admin Login Modal */}
                    {showLogin && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/90 backdrop-blur-2xl flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[50px] p-12 text-center shadow-2xl animate-card">
                                <h3 className="text-xl font-black mb-8 tracking-tighter uppercase italic">Akses Terbatas</h3>
                                <input type="password" placeholder="Passcode" className="w-full px-8 py-5 bg-slate-50 rounded-2xl font-black text-center mb-6 tracking-widest border-none outline-none focus:ring-4 focus:ring-indigo-50" value={passInput} onChange={e => setPassInput(e.target.value)} autoFocus />
                                <button onClick={() => {if(passInput==='2024'){setIsAuth(true); setShowLogin(false); setPassInput('');} else alert('Passcode Salah');}} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">VERIFIKASI</button>
                                <button onClick={() => setShowLogin(false)} className="mt-4 text-slate-300 font-bold text-[10px] uppercase tracking-widest">Batal</button>
                            </div>
                        </div>
                    )}

                    {/* Post Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-[100] bg-white overflow-y-auto px-6 py-12">
                            <div className="max-w-xl mx-auto">
                                <div className="flex justify-between items-center mb-12">
                                    <h2 className="text-4xl font-black italic tracking-tighter uppercase">Posting</h2>
                                    <button onClick={() => setShowModal(false)} className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center font-bold">✕</button>
                                </div>
                                <form onSubmit={handleSave} className="space-y-8 pb-20">
                                    <div className="relative aspect-video bg-slate-50 border-4 border-dashed border-slate-100 rounded-[40px] flex items-center justify-center overflow-hidden">
                                        {formData.fileData ? (
                                            formData.type === 'video' ? <video src={formData.fileData} className="w-full h-full object-cover" /> : <img src={formData.fileData} className="w-full h-full object-cover" />
                                        ) : (
                                            <div className="text-center">
                                                <div className="text-slate-300 font-black text-[10px] uppercase tracking-[0.3em]">Tap Untuk Unggah Media</div>
                                                <div className="text-slate-200 text-[8px] mt-2 font-bold uppercase tracking-widest">(Foto atau Video)</div>
                                            </div>
                                        )}
                                        <input type="file" accept="image/*,video/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleFileUpload} required />
                                    </div>
                                    <input placeholder="Judul Proyek" className="w-full px-8 py-6 bg-slate-50 rounded-3xl font-bold border-none outline-none focus:ring-4 focus:ring-indigo-50" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} required />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="px-8 py-6 bg-slate-50 rounded-3xl font-bold border-none outline-none focus:ring-4 focus:ring-indigo-50 text-indigo-600 appearance-none" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                            <option>Website</option><option>Foto</option><option>Video</option><option>Desain</option>
                                        </select>
                                        <input placeholder="Link (Opsional)" className="px-8 py-6 bg-slate-50 rounded-3xl font-bold border-none outline-none focus:ring-4 focus:ring-indigo-50" value={formData.link} onChange={e => setFormData({...formData, link: e.target.value})} />
                                    </div>
                                    <textarea placeholder="Ceritakan sedikit tentang karya ini..." className="w-full px-8 py-6 bg-slate-50 rounded-[40px] font-bold border-none outline-none focus:ring-4 focus:ring-indigo-50 h-40 resize-none" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} required />
                                    <button disabled={isSaving} className={`w-full py-7 text-white rounded-[40px] font-black shadow-2xl transition-all ${isSaving ? 'bg-slate-200' : 'bg-slate-900 active:scale-95'}`}>
                                        {isSaving ? 'SEDANG MENGIRIM...' : 'PUBLISH KE ARSIP'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Plus Button */}
                    {isAuth && (
                        <button onClick={() => setShowModal(true)} className="fixed bottom-10 right-8 w-20 h-20 bg-indigo-600 text-white rounded-[30px] shadow-2xl flex items-center justify-center z-50 hover:scale-110 active:scale-90 transition-all">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M12 5v14M5 12h14" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        </button>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
